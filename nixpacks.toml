[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
    "npm install",
    "cd backend && composer install --no-dev"
]

[phases.build]
cmds = [
    "npm run build",
    "mkdir -p backend/public/build && cp -r dist/* backend/public/"
]

[start]
cmd = "cd backend && php artisan serve --host=0.0.0.0 --port=$PORT"
